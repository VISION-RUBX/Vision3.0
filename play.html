<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050505">
  <title>Vision 3.0 Player</title>
  <link rel="stylesheet" href="./styles.css">
  <script type="module" src="./play.js" defer></script>
</head>
<body class="page page-play">
  <canvas id="particleCanvas" class="particle-canvas" aria-hidden="true"></canvas>
  <div class="page-transition" aria-hidden="true"></div>

  <div class="player-shell">
    <header class="player-bar">
      <div class="player-actions">
        <button id="homepageButton" class="back-button" type="button">
          <span aria-hidden="true">&larr;</span>
          <span>Homepage</span>
        </button>
        <button id="fullscreenButton" class="ghost-button" type="button">
          <span id="fullscreenLabel">Fullscreen</span>
        </button>
        <button id="focusModeButton" class="ghost-button" type="button" aria-pressed="false">
          <span data-focus-label>Focus Mode</span>
        </button>
      </div>

      <div class="player-meta">
        <p class="eyebrow">Validated Launch</p>
        <h1 id="playerTitle">Loading game...</h1>
        <p id="playerMeta" class="panel-copy">Preparing local player...</p>
      </div>

      <p id="playerStatus" class="player-status">Starting player...</p>
    </header>

    <main class="player-main">
      <div id="playerError" class="state-block hidden" role="alert">
        <h2>Game not available</h2>
        <p>Return to the homepage and choose a different game.</p>
      </div>

      <section id="frameWrap" class="frame-wrap hidden" tabindex="-1">
        <div id="frameLoading" class="frame-loading">Launching game...</div>
        <iframe
          id="gameFrame"
          title="Game player"
          loading="eager"
          allow="autoplay; fullscreen; gamepad; clipboard-read; clipboard-write"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </section>
    </main>
  </div>

  <section id="musicDock" class="music-dock hidden" aria-label="Music player">
    <div class="music-dock-main">
      <div class="music-dock-copy">
        <p class="eyebrow">Vision Music</p>
        <h2 data-track-title>Loading playlist...</h2>
        <p data-track-meta class="panel-copy">Pulling audio from the Canva archive.</p>
      </div>

      <div class="music-dock-controls">
        <button type="button" class="control-button" data-music-prev>Prev</button>
        <button type="button" class="control-button control-button-strong" data-music-play>Play</button>
        <button type="button" class="control-button" data-music-next>Next</button>
        <button type="button" class="control-button" data-music-mute>Mute</button>
      </div>
    </div>

    <div class="music-dock-bottom">
      <span data-track-time>0:00</span>
      <input type="range" min="0" max="1" step="0.01" value="0" data-music-seek aria-label="Track progress">
      <span data-track-duration>0:00</span>
      <input class="volume-slider" type="range" min="0" max="1" step="0.01" value="0.72" data-music-volume aria-label="Volume">
    </div>
  </section>
</body>
</html>
